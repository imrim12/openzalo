services:
  postgres:
    container_name: openzalo-pg
    image: postgres:latest
    volumes:
      - ./.docker/postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    restart: always

  redis:
    container_name: openzalo-redis
    image: redis:latest
    volumes:
      - ./.docker/redis:/data
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis}
    ports:
      - '${REDIS_PORT:-6379}:6379'
    restart: always

  redisinsight:
    image: redis/redisinsight:latest
    container_name: openzalo-redisinsight
    ports:
      - '5540:5540'
    restart: always

  mondodb:
    container_name: openzalo-mongodb
    image: mongo:latest
    volumes:
      - ./.docker/mongodb:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-password}
    ports:
      - '27017:27017'
    restart: always

  zalo-worker:
    container_name: openzalo-zalo-worker
    build:
      context: .
      dockerfile: Dockerfile.zalo
    env_file:
      - .env
    ports:
      - '3001:3000'
    environment:
      NUXT_REDIS_HOST: redis
      NUXT_REDIS_PORT: '6379'
      NUXT_REDIS_PASSWORD: ''
      NUXT_PUBLIC_BASE_DOMAIN: host.docker.internal:3000
      NUXT_PUBLIC_SSL_ENABLED: 'false'
    depends_on:
      - redis
    restart: always

  mailhog:
    container_name: openzalo-mailhog
    image: mailhog/mailhog:latest
    volumes:
      - ./.docker/mailhog:/data
    ports:
      - '${SMTP_PORT:-1025}:1025' # SMTP server port
      - '${SMTP_WEB_PORT:-8025}:8025' # Web UI port
    restart: always
